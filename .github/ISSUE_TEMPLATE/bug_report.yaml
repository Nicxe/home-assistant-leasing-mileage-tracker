name: Bug Report
description: Report a problem with Leasing Mileage Tracker
title: "[Bug]: "
labels: ["bug"]
assignees: ["Nicxe"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I am running the latest version of Leasing Mileage Tracker
          required: true
        - label: I have searched existing issues
          required: true
        - label: I have restarted Home Assistant
          required: true

  - type: input
    id: version
    attributes:
      label: Leasing Mileage Tracker Version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is happening?
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Enable Debug Logging for Leasing Mileage Tracker

        Before submitting a bug report, please enable debug logging:

        1. Go to **Settings > Devices & Services > Integrations**
        2. Find **Leasing Mileage Tracker** and click the three dots > **Enable Debug Logging**
        3. Restart Home Assistant
        4. Reproduce the issue
        5. Go to **Settings > System > Logs**
        6. Download the full log or copy the relevant part for Leasing Mileage Tracker
        Paste the debug log below.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant Home Assistant logs
      render: shell
